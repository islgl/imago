name = "imago"
main = "src/worker/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

routes = [
  { pattern = "imago.lglgl.me", custom_domain = true }
]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[r2_buckets]]
binding = "R2"
bucket_name = "imago-images"
preview_bucket_name = "imago-images-dev"

[[d1_databases]]
binding = "DB"
database_name = "imago"
database_id = "369212c3-0eec-4cf5-93e2-b3db9666756d"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "RL_KV"
id = "7ce0fa61daa84a17b78bcf097c03f4db"

[vars]
ENVIRONMENT = "production"
# Comma-separated allowed referer domains, e.g. "myblog.com,www.myblog.com"
# Leave empty to allow all referers
ALLOWED_REFERERS = "nous.lglgl.me"
# Max requests per IP per minute for public images (0 = unlimited)
RATE_LIMIT_RPM = "120"
