<!DOCTYPE html>
<html lang="zh">
<head>

<title>imago · og image</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,wght@0,500;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    background: #faf9f7;
    font-family: 'Inter', sans-serif;

  .logo { width: 200px; height: 200px; display: block; }
  .wordmark {
    font-family: 'Newsreader', Georgia, serif;

    color: #37352f;
    margin-top: 32px;
  }
  .tagline {
    font-size: 20px; color: #787774; letter-spacing: 0.02em;
    margin-top: 14px; font-weight: 400;
  }
  .domain {
    position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);

  }

  /* 底部极细装饰线 */
  .hairline {
    position: absolute; bottom: 88px; left: 50%; transform: translateX(-50%);

  }

<div class="corner">IMAGO · PRIVATE ARCHIVE</div>

<svg class="logo" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" fill="none">

      <stop offset="0" stop-color="#2d2d2d"/>

    <radialGradient id="og-glow" cx="0.5" cy="0.5" r="0.42">

  <circle cx="48" cy="48" r="9" fill="url(#og-glow)"/>
  <circle cx="48" cy="48" r="2.2" fill="#f5e6c3"/>

<div class="wordmark">imago</div>
<div class="tagline">your private archive — where images become</div>
<div class="hairline"></div>
<div class="domain">imago.lglgl.me</div>
